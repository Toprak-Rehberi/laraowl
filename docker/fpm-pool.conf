; LaraOwl ingest trafiği (izlenen uygulamaların her request/job sonu POST'u)
; alpine default'u pm.max_children=5'i anında doyuruyordu -> UI 504 + client
; tarafında ingest timeout. Havuz sunucu kapasitesine göre genişletildi.
[www]
pm = dynamic
pm.max_children = 30
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 10
pm.max_requests = 1000
